<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Structure</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; font-family: 'Nunito', sans-serif; }

  .hero { background: #FFFF00; padding: 46px 40px 36px; display: flex; align-items: center; gap: 28px; }
  .hero-letter { font-family: 'Bebas Neue', sans-serif; font-size: 8rem; color: #000; line-height: 1; flex-shrink: 0; }
  .hero-text h1 { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 3px; color: #000; }
  .hero-text p { font-size: 1rem; color: #111; margin-top: 4px; font-weight: 700; }

  .main { max-width: 980px; margin: 0 auto; padding: 36px 24px 60px; }

  .year-block { margin-bottom: 48px; }
  .year-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; letter-spacing: 4px; padding: 11px 24px; border-radius: 8px; margin-bottom: 18px; display: inline-block; color: #000; background: #00E5FF; }

  .topics { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .topic-card { border-radius: 14px; padding: 20px 22px; display: flex; flex-direction: column; gap: 12px; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(0,0,0,0.5); background: #1a1a1a; border-left: 6px solid #00E5FF; }
  .topic-card:hover { transform: translateY(-5px); box-shadow: 0 12px 32px rgba(0,0,0,0.6); }

  .topic-name { font-weight: 900; font-size: 1.05rem; color: #fff; line-height: 1.3; }
  .topic-args { display: flex; flex-wrap: wrap; gap: 5px; }
  .topic-args span { display: inline-block; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 3px 10px; font-size: 0.78rem; font-weight: 700; color: #ccc; }

  .topic-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .tag { border-radius: 20px; padding: 6px 16px; font-size: 0.82rem; font-weight: 700; text-decoration: none; transition: all 0.2s; background: #00E5FF; color: #000; display: inline-block; }
  .tag:hover { background: #fff; }

  .final-revision-box { grid-column: 1 / -1; margin-top: 20px; padding: 20px; border-radius: 14px; border: 2px dashed #FFFF00; display: flex; justify-content: space-between; align-items: center; }
  .final-revision-text { color: #FFFF00; font-weight: 900; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; text-transform: uppercase; }
  .tag-final { background: #FFFF00; color: #000; padding: 8px 24px; border-radius: 20px; text-decoration: none; font-weight: 900; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-letter">S</div>
  <div class="hero-text">
    <h1>The Structure</h1>
    <p>Grammar & Functions · B2</p>
  </div>
</div>

<div class="main">
  <div class="year-block">
    <div class="year-title">UNITÀ B2</div>
    <div class="topics">
      
      <div class="topic-card">
        <div class="topic-name">Unit 1 · [Titolo]</div>
        <div class="topic-args">
          <span>Argomento A</span><span>Argomento B</span>
        </div>
        <div class="topic-links">
          <a href="unit1-index.html" class="tag">📖 Ripassa</a>
          <a href="link-esercizi.html" class="tag">✏️ Esercitati</a>
        </div>
      </div>
      </div>
  </div>
</div>
</body>
</html>
