<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Structure - Ripasso</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght=400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; color: #fff; font-family: 'Nunito', sans-serif; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
  
  .container { width: 100%; max-width: 680px; }

  /* Pulsante Chiudi in alto */
  .close-btn { background: #00E5FF; color: #000; font-weight: 900; text-decoration: none; font-size: 0.95rem; padding: 10px 24px; border-radius: 20px; text-transform: uppercase; margin-bottom: 25px; display: inline-block; cursor: pointer; border: none; transition: transform 0.1s; }
  .close-btn:hover { transform: scale(1.03); }

  /* Banner dell'Unità (Stile lo screenshot) */
  .unit-banner { background: #00E5FF; color: #000; border-radius: 18px; padding: 30px 24px; margin-bottom: 25px; box-shadow: 0 4px 20px rgba(0,229,255,0.2); }
  .unit-title { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 2px; line-height: 1.1; display: flex; align-items: center; gap: 12px; }
  .unit-subtitle { font-size: 1.05rem; font-weight: 900; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8; }

  /* Lista degli argomenti */
  .topic-list { display: flex; flex-direction: column; gap: 14px; }
  
  .topic-row { background: #141414; border: 1px solid #222; border-left: 5px solid #00E5FF; border-radius: 12px; padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; gap: 15px; transition: box-shadow 0.2s; }
  .topic-row:hover { box-shadow: 0 0 15px rgba(0, 229, 255, 0.15); }

  .topic-info { flex-grow: 1; }
  .topic-name { font-weight: 900; font-size: 1.2rem; color: #fff; margin-bottom: 4px; }
  .topic-details { font-size: 0.85rem; color: #777; font-weight: 700; }

  /* Pulsante Ripassa della riga */
  .row-btn { background: #00E5FF; color: #000; font-weight: 900; text-decoration: none; font-size: 0.85rem; padding: 8px 18px; border-radius: 20px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; border: none; cursor: pointer; }
  .row-btn:hover { background: #fff; }
  .row-btn::before { content: "📖"; font-size: 0.9rem; }

  .error-box { text-align: center; padding: 40px; color: #ff3333; font-weight: 900; }
</style>
</head>
<body>

<div class="container">
  <div style="text-align: center;">
    <a href="javascript:window.close()" class="close-btn">✕ Chiudi questa scheda</a>
  </div>

  <div id="dynamic-hub">
    </div>
</div>

<script>
  // Legge l'unità dal link (es. structure-u1-index.html?unit=1)
  const urlParams = new URLSearchParams(window.location.search);
  const unit = urlParams.get('unit') || "1";

  // Database dei sotto-indici delle Unità (Contenuti presi dai tuoi schemi B2)
  const structureDatabase = {
    "1": {
      title: "📖 UNIT 1 · PAST NARRATIVE",
      subtitle: "Scegli un argomento da ripassare",
      items: [
        { name: "Used to", details: "used to + infinitive · abitudini passate e stati interrotti" },
        { name: "Past Continuous", details: "was/were + -ing · azioni in corso in un momento passato" },
        { name: "Past Continuous vs Past Simple", details: "azioni di sfondo vs azioni brevi di interruzione" },
        { name: "When, While, As", details: "connessioni temporali corrette nella narrazione" },
        { name: "Adverbs of sequence", details: "first, then, after that, next, finally per dare ordine" }
      ]
    },
    "2": {
      title: "📖 UNIT 2 · PRESENT PERFECT ASPECT",
      subtitle: "Scegli un argomento da ripassare",
      items: [
        { name: "Present Perfect Continuous", details: "have/has been + -ing · enfasi sulla durata e continuità" },
        { name: "Present Perfect Simple vs Continuous", details: "risultato o azione completata vs durata dell'azione" },
        { name: "Present Perfect vs Past Simple", details: "tempo indeterminato/legame presente vs tempo concluso" }
      ]
    }
    // Il database include già lo spazio per inserire le successive unità con la stessa logica
  };

  const currentUnit = structureDatabase[unit];
  const hubArea = document.getElementById('dynamic-hub');

  if (currentUnit) {
    let rowsHtml = '';
    currentUnit.items.forEach(item => {
      rowsHtml += `
        <div class="topic-row">
          <div class="topic-info">
            <div class="topic-name">${item.name}</div>
            <div class="topic-details">${item.details}</div>
          </div>
          <button class="row-btn">Ripassa</button>
        </div>
      `;
    });

    hubArea.innerHTML = `
      <div class="unit-banner">
        <div class="unit-title">${currentUnit.title}</div>
        <div class="unit-subtitle">${currentUnit.subtitle}</div>
      </div>
      <div class="topic-list">
        ${rowsHtml}
      </div>
    `;
  } else {
    hubArea.innerHTML = `<div class="error-box"><h2>Unit ${unit} Not Found</h2><p>Controlla la configurazione dei link.</p></div>`;
  }
</script>

</body>
</html>
